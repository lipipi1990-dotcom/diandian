<svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" viewBox="0 0 36 36">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4CD964"/>
      <stop offset="100%" style="stop-color:#007AFF"/>
    </linearGradient>
  </defs>
  <!-- 圆角背景 -->
  <rect width="36" height="36" rx="8" ry="8" fill="url(#bg)"/>
  <!-- 外圆弧 -->
  <circle cx="17" cy="19" r="11" fill="none" stroke="white" stroke-width="1.5" stroke-dasharray="50 20" stroke-linecap="round"/>
  <!-- H 字母 -->
  <text x="17" y="23" text-anchor="middle" font-family="Arial Black, sans-serif" font-weight="900" font-size="13" fill="white">H</text>
  <!-- $ 徽章 -->
  <circle cx="26" cy="10" r="5" fill="white"/>
  <text x="26" y="13.5" text-anchor="middle" font-family="Arial, sans-serif" font-weight="700" font-size="7" fill="#2ECC40">$</text>
</svg>
